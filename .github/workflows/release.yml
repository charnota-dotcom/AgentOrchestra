name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build Installer - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            briefcase_target: linux
            artifact_name: AgentOrchestra-Linux
          - os: windows-latest
            briefcase_target: windows
            artifact_name: AgentOrchestra-Windows
          - os: macos-latest
            briefcase_target: macOS
            artifact_name: AgentOrchestra-macOS

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Briefcase & Dependencies
        run: |
          python -m pip install --upgrade pip briefcase
          pip install -e ".[dev,gui,google]"

      - name: Install Linux Dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y git libxcb-cursor0

      - name: Briefcase Create
        run: briefcase create ${{ matrix.briefcase_target }}

      - name: Briefcase Build
        run: briefcase build ${{ matrix.briefcase_target }}

      - name: Briefcase Package
        run: briefcase package ${{ matrix.briefcase_target }}

      # Note: Code signing is intentionally omitted in this workflow as we do not have
      # production certificates in the repository. A complete production release workflow
      # would add `--identity` (macOS) or use `SIGNTOOL_CERT_FILE` (Windows) here.

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            macOS/**/*.dmg
            windows/**/*.msi
            linux/**/*.AppImage
            linux/**/*.deb

  publish:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/**/*
          generate_release_notes: true
