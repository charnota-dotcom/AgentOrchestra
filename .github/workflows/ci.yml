name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: python -m pip install "ruff>=0.5"
      - name: Ruff lint
        run: ruff check .
      - name: Ruff format check
        run: ruff format --check .

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - name: Configure git identity for tests
        run: |
          git config --global user.email "ci@agentorchestra.test"
          git config --global user.name "AgentOrchestra CI"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install -U pip
          python -m pip install -e ".[dev]"
      - name: Show env
        run: |
          python --version
          python -m pip list
          python -c "import apps.service.types; print('imports ok')"
      - name: Pytest (unit)
        run: pytest tests/unit -v --tb=short
      - name: Pytest (integration)
        # Integration tests touch the filesystem and spawn git; allowed
        # to fail while we stabilise the suite (re-enabled hard gating
        # once unit is green).
        continue-on-error: true
        run: pytest tests/integration -v --tb=short
