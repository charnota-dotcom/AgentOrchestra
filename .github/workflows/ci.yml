name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Configure git identity for tests
        run: |
          git config --global user.email "ci@agentorchestra.test"
          git config --global user.name "AgentOrchestra CI"
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Install
        run: |
          python -m pip install -U pip
          # Install with `dev` extras only — GUI deps require a display.
          python -m pip install -e ".[dev]"
      - name: Ruff lint
        run: ruff check .
      - name: Ruff format check
        run: ruff format --check .
      - name: Mypy
        run: mypy apps packs || true   # advisory-only in MVP; tightens after V1
      - name: Pytest (unit)
        run: pytest tests/unit -v
      - name: Pytest (integration)
        run: pytest tests/integration -v
